<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitaciones</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Hotel - Panel</h1>
    <div class="user-info">
        <span id="welcome"></span>
        <button onclick="logout()">Cerrar sesión</button>
    </div>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="location.href='index.html'">Habitaciones</button>
        <button class="tab-btn" onclick="location.href='reservaciones.html'">Reservaciones</button>
    </div>

    <!-- Formulario crear habitación (solo ADMIN) -->
    <div class="card admin-only" id="form-card">
        <h2>Registrar Habitación</h2>
        <div class="form-grid">
            <div>
                <label>Número</label>
                <input id="h-numero" type="text" placeholder="101">
            </div>
            <div>
                <label>Tipo</label>
                <select id="h-tipo">
                    <option value="SENCILLA">Sencilla</option>
                    <option value="DOBLE">Doble</option>
                    <option value="SUITE">Suite</option>
                    <option value="PRESIDENCIAL">Presidencial</option>
                </select>
            </div>
            <div>
                <label>Precio por noche (MXN)</label>
                <input id="h-precio" type="number" step="0.01" placeholder="1500.00">
            </div>
            <div>
                <label>Capacidad</label>
                <input id="h-capacidad" type="number" placeholder="2">
            </div>
            <div class="full-width">
                <label>Descripción</label>
                <input id="h-descripcion" type="text" placeholder="Vista al mar, cama king size">
            </div>
        </div>
        <br>
        <button class="btn btn-primary" onclick="crearHabitacion()">Guardar Habitación</button>
    </div>

    <!-- Tabla de habitaciones -->
    <div class="card">
        <h2>Habitaciones Disponibles</h2>
        <table>
            <thead>
                <tr>
                    <th>Número</th><th>Tipo</th><th>Precio/noche</th>
                    <th>Capacidad</th><th>Estado</th><th class="admin-only">Acciones</th>
                </tr>
            </thead>
            <tbody id="habitaciones-body">
                <tr><td colspan="6">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="js/auth.js"></script>
<script>
    requireAuth();
    document.getElementById('welcome').textContent =
        `${getNombre()} (${isAdmin() ? 'ADMIN' : 'USUARIO'})`;

    // Mostrar elementos admin
    if (isAdmin()) {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
    }

    async function cargarHabitaciones() {
        try {
            const res = await apiFetch('/api/habitaciones');
            const data = await res.json();
            const tbody = document.getElementById('habitaciones-body');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="6">No hay habitaciones registradas.</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(h => `
                <tr>
                    <td>${h.numero}</td>
                    <td>${h.tipo}</td>
                    <td>$${Number(h.precioPorNoche).toFixed(2)}</td>
                    <td>${h.capacidad}</td>
                    <td><span class="badge badge-${h.estado.toLowerCase()}">${h.estado}</span></td>
                    <td class="admin-only" ${isAdmin() ? '' : 'style="display:none"'}>
                        <button class="btn btn-danger btn-sm" onclick="eliminarHabitacion(${h.id})">Eliminar</button>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            showToast(false, 'Error al cargar habitaciones');
        }
    }

    async function crearHabitacion() {
        const body = {
            numero: document.getElementById('h-numero').value.trim(),
            tipo: document.getElementById('h-tipo').value,
            precioPorNoche: parseFloat(document.getElementById('h-precio').value),
            capacidad: parseInt(document.getElementById('h-capacidad').value),
            descripcion: document.getElementById('h-descripcion').value.trim()
        };
        if (!body.numero || !body.precioPorNoche || !body.capacidad) {
            showToast(false, 'Completa los campos obligatorios'); return;
        }
        try {
            const res = await apiFetch('/api/habitaciones', { method: 'POST', body: JSON.stringify(body) });
            const data = await res.json();
            if (res.ok) {
                showToast(true, 'Habitación registrada');
                document.getElementById('h-numero').value = '';
                document.getElementById('h-precio').value = '';
                document.getElementById('h-capacidad').value = '';
                document.getElementById('h-descripcion').value = '';
                cargarHabitaciones();
            } else {
                showToast(false, data.error || 'Error al crear');
            }
        } catch (e) {
            showToast(false, 'Error en la petición');
        }
    }

    async function eliminarHabitacion(id) {
        if (!confirm('¿Eliminar esta habitación?')) return;
        try {
            const res = await apiFetch('/api/habitaciones/' + id, { method: 'DELETE' });
            if (res.ok || res.status === 204) {
                showToast(true, 'Habitación eliminada');
                cargarHabitaciones();
            } else {
                const data = await res.json();
                showToast(false, data.error || 'Error al eliminar');
            }
        } catch (e) {
            showToast(false, 'Error en la petición');
        }
    }

    cargarHabitaciones();
</script>

</body>
</html>
