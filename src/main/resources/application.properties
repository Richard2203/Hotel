# ============================================================
# SISTEMA HOTELERO
# ============================================================
spring.application.name=hotel-api
server.port=8080

# BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=My_Sql_1805
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JJACKSON
spring.jackson.time-zone=America/Mexico_City
spring.jackson.default-property-inclusion=non_null

# JWT
# Genera una clave segura de al menos 256 bits (32 chars)
jwt.secret=clave-super-secreta-escom-ipn-hotel-2026
jwt.expiration=86400000

# JSPRINGDOC / SWAGGER UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
springdoc.cache.disabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.syntax-highlight.active=true
springdoc.swagger-ui.persist-authorization=true
